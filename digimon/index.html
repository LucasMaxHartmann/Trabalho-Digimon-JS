<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Digimon</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Buscar Digimon</h1>

    <form id="formulario">

        <input
            type="text"
            id="digimonInput"
            placeholder="Digite o nome do Digimon"
            required
        >

        <button type="submit" id="buscarBtn">
            Buscar
        </button>

    </form>

    <div id="resultado">

        <img id="digimonImg" src="" alt="">

        <h2 id="digimonNome"></h2>

        <p id="digimonLevel"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
