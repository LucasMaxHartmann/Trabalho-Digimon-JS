<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digimon Search</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- Título principal da página -->
    <h1>Buscar Digimon</h1>
    
<!-- Campo para digitar o nome do Digimon -->
    <input 
        type="text" 
        id="digimonInput" 
        placeholder="Digite o nome do Digimon">

    <button id="buscarBtn">
        Buscar
    </button>

    <!-- Área de resultado -->
    <div id="resultado">

        <img id="digimonImg" src="" alt="">

        <h2 id="digimonNome"></h2>

        <p id="digimonLevel"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
